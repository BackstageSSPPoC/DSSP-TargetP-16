# ============================================================
# AI-Generated GitHub Actions CI/CD Workflow
# Repo: DSSP-TargetP-16 | Env: qa
# Stack: python / python / pip
# AI Decisions: base=python:3.11-slim port=5000
# Generated by Backstage AI DevOps Scaffolder
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: DSSP-TargetP-16
  DOCKER_IMAGE: chaitanyapandeygspann/dssp-targetp-16
  DEPLOY_ENV: qa
  DEPLOY_NAMESPACE: qa
  APP_PORT: "5000"

jobs:
  # ─────────────────────────────────────────────────────────
  # CI — Setup + Build + Test + SonarQube (all branches)
  # ─────────────────────────────────────────────────────────
  ci:
    name: CI — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache
        uses: actions/cache@v4
        with:
          path: venv/
          key: ${{ runner.os }}-pip-${{ hashFiles('**/pom.xml', '**/package-lock.json', '**/go.sum', '**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # AI-decided: setup for python/pip
      - name: Setup Environment
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip3 install --upgrade pip
          if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip3 install poetry && poetry install; fi

      # AI-decided: build
      - name: Build
        run: |
          . venv/bin/activate && pip3 install -r requirements.txt || true

      # AI-decided: test
      - name: Run Tests
        run: |
          . venv/bin/activate && python3 -m pytest --tb=short || true

      # SonarQube — language-specific flags for python
      - name: SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.APP_NAME }}
            -Dsonar.python.version=3 -Dsonar.sources=. -Dsonar.exclusions=venv/**

  # ─────────────────────────────────────────────────────────
  # CD — Docker Build + Push + GitOps Update (main only)
  # ─────────────────────────────────────────────────────────
  cd:
    name: CD — Docker & GitOps
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        run: |
          IMAGE_TAG=${{ env.DOCKER_IMAGE }}:1.0.${{ github.run_number }}
          docker build -t $IMAGE_TAG -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push $IMAGE_TAG
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Update GitOps Repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 https://$GH_PAT@github.com/BackstageSSPPoC/k8s-manifests.git gitops
          cd gitops
          mkdir -p argocd apps/${{ env.APP_NAME }}/${{ env.DEPLOY_ENV }}
          cp ../manifest-templates/application.yaml argocd/${{ env.APP_NAME }}-${{ env.DEPLOY_ENV }}.yaml || true
          cp ../manifest-templates/deployment.yaml  apps/${{ env.APP_NAME }}/${{ env.DEPLOY_ENV }}/ || true
          cp ../manifest-templates/service.yaml     apps/${{ env.APP_NAME }}/${{ env.DEPLOY_ENV }}/ || true
          cp ../manifest-templates/ingress.yaml     apps/${{ env.APP_NAME }}/${{ env.DEPLOY_ENV }}/ || true
          for f in apps/${{ env.APP_NAME }}/${{ env.DEPLOY_ENV }}/*.yaml argocd/${{ env.APP_NAME }}-${{ env.DEPLOY_ENV }}.yaml; do
            [ -f "$f" ] || continue
            sed -i "s|\\${APP_NAME}|${{ env.APP_NAME }}|g"          "$f"
            sed -i "s|\\\${DOCKER_IMAGE}|${{ env.IMAGE_TAG }}|g"     "$f"
            sed -i "s|\\${APP_PORT}|${{ env.APP_PORT }}|g"          "$f"
            sed -i "s|\\${NAMESPACE}|${{ env.DEPLOY_NAMESPACE }}|g" "$f"
          done
          git config user.email "gha@local"
          git config user.name "GitHub Actions"
          git add .
          git diff --cached --quiet || git commit -m "[${{ env.DEPLOY_ENV }}] Deploy ${{ env.APP_NAME }} run ${{ github.run_number }}"
          git push
